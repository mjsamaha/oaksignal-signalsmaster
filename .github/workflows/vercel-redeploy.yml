name: Vercel Redeploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to redeploy
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
      reason:
        description: Optional reason for this redeploy
        required: false
        type: string

concurrency:
  group: vercel-redeploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  redeploy:
    name: Trigger Vercel Deploy Hook
    runs-on: ubuntu-latest

    steps:
      - name: Select deploy hook URL
        id: hook
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          HOOK_URL: ${{ secrets[format('VERCEL_DEPLOY_HOOK_URL_{0}', (github.event.inputs.environment || 'production') == 'preview' && 'PREVIEW' || 'PRODUCTION')] }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$HOOK_URL" ]]; then
            echo "Missing Vercel deploy hook secret for environment: $ENVIRONMENT"
            echo "Set VERCEL_DEPLOY_HOOK_URL_PRODUCTION and/or VERCEL_DEPLOY_HOOK_URL_PREVIEW in GitHub repository secrets."
            exit 1
          fi

          echo "hook_url=$HOOK_URL" >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"

      - name: Trigger redeploy
        shell: bash
        run: |
          set -euo pipefail

          REASON="${{ github.event.inputs.reason }}"
          if [[ -n "$REASON" ]]; then
            echo "Redeploy reason: $REASON"
          fi

          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE="$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" -X POST "${{ steps.hook.outputs.hook_url }}")"

          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "Vercel deploy hook request failed with HTTP $HTTP_CODE"
            cat "$RESPONSE_FILE"
            exit 1
          fi

          echo "Vercel redeploy triggered for ${{ steps.hook.outputs.environment }}."
          cat "$RESPONSE_FILE"
